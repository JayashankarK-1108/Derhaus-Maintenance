<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunrise Apartments — Maintenance</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Sunrise Apartments</h1>
      <div class="month-picker">
        <label for="month">Month</label>
        <input type="month" id="month">
        <button id="load-btn">Load</button>
      </div>
    </header>

    <div id="error-banner" hidden role="alert"></div>

    <nav class="tabs">
      <button class="tab active" data-tab="bookings">Water Bookings</button>
      <button class="tab" data-tab="flats">Flat Details</button>
      <button class="tab" data-tab="usage">Water Usage</button>
    </nav>

    <!-- Tab 1: Water Bookings -->
    <div id="tab-bookings" class="tab-panel">
      <div class="panel">
        <h2>Add Booking</h2>
        <div class="row">
          <input type="date" id="booking-date">
          <input type="text" id="booking-type" placeholder="Type of load (e.g. Metro)">
          <input type="number" id="booking-litres" placeholder="Litres" min="0">
          <input type="number" id="booking-price" placeholder="Price ₹" min="0">
          <button id="add-booking-btn">Add</button>
        </div>
      </div>
      <div class="panel">
        <h2>Bookings this month</h2>
        <div id="bookings-table"></div>
      </div>
    </div>

    <!-- Tab 2: Flat Details -->
    <div id="tab-flats" class="tab-panel" hidden>
      <div class="panel">
        <h2>Flat Details</h2>
        <div id="flats-table"></div>
        <button id="save-readings-btn" style="margin-top:14px">Save Readings</button>
      </div>
    </div>

    <!-- Tab 3: Water Usage -->
    <div id="tab-usage" class="tab-panel" hidden>
      <section class="cards" id="summary-cards"></section>
      <div class="panel">
        <h2>Water Usage</h2>
        <div id="usage-table"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
