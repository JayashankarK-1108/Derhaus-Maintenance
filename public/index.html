<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Derhaus — Apartment Maintenance</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="header-top">
      <div class="logo">
        <span class="logo-icon">🏢</span>
        <div>
          <div class="logo-text">Derhaus</div>
          <div class="logo-sub">Apartment Maintenance</div>
        </div>
      </div>
      <div class="month-picker">
        <label for="month">Month</label>
        <input type="month" id="month">
        <button id="load-btn" class="btn-load">Load</button>
      </div>
    </div>
    <nav class="header-nav">
      <button class="tab active" data-tab="bookings">
        <span class="tab-icon">💧</span> Water Bookings
      </button>
      <button class="tab" data-tab="flats">
        <span class="tab-icon">🏠</span> Flat Details
      </button>
      <button class="tab" data-tab="usage">
        <span class="tab-icon">📊</span> Water Usage
      </button>
    </nav>
  </header>

  <div class="wrap">
    <div id="error-banner" hidden role="alert"></div>

    <div class="page-intro">
      <h2 id="page-title">💧 Water <span class="accent">Bookings</span></h2>
      <p id="page-subtitle">Track water deliveries for the month</p>
    </div>

    <!-- ── Tab 1: Water Bookings ───────────────── -->
    <div id="tab-bookings" class="tab-panel">

      <div class="panel">
        <div class="panel-title"><span>➕</span> Add Booking</div>
        <div class="form-row">
          <div class="form-field">
            <label>Date</label>
            <input type="date" id="booking-date">
          </div>
          <div class="form-field">
            <label>Flat</label>
            <select id="booking-flat">
              <option value="">— Select Flat —</option>
            </select>
          </div>
          <div class="form-field">
            <label>Type of Load</label>
            <select id="booking-type">
              <option value="">— Select —</option>
              <option value="Metro">Metro</option>
              <option value="Private">Private</option>
            </select>
          </div>
          <div class="form-field">
            <label>Litres</label>
            <select id="booking-litres">
              <option value="">— Select —</option>
              <option value="9000">9,000 L</option>
              <option value="12000">12,000 L</option>
              <option value="18000">18,000 L</option>
            </select>
          </div>
          <div class="form-field">
            <label>Price (₹)</label>
            <input type="number" id="booking-price" placeholder="0" min="0">
          </div>
          <button id="add-booking-btn" class="btn-primary">Add Booking</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title"><span>📋</span> Bookings this month</div>
        <div id="bookings-table"></div>
      </div>

    </div>

    <!-- ── Tab 2: Flat Details ─────────────────── -->
    <div id="tab-flats" class="tab-panel" hidden>

      <div class="panel">
        <div class="panel-title"><span>🔢</span> Current Meter Readings</div>
        <div id="flats-table"></div>
        <button id="save-readings-btn" class="btn-secondary">Save Readings</button>
      </div>

    </div>

    <!-- ── Tab 3: Water Usage ──────────────────── -->
    <div id="tab-usage" class="tab-panel" hidden>

      <section class="cards" id="summary-cards"></section>

      <div class="panel">
        <div class="panel-title"><span>💦</span> Per-Flat Breakdown</div>
        <div id="usage-table"></div>
      </div>

    </div>
  </div>

  <script src="app.js?v=6"></script>
</body>
</html>
