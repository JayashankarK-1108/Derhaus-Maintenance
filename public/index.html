<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunrise Apartments — Maintenance</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Sunrise Apartments</h1>
      <div class="month-picker">
        <label for="month">Month</label>
        <input type="month" id="month">
        <button id="load-btn">Load</button>
      </div>
    </header>

    <div id="error-banner" hidden role="alert"></div>

    <section class="cards" id="summary-cards"></section>

    <section class="panel">
      <h2>Enter meter readings</h2>
      <div id="readings-form"></div>
    </section>

    <section class="panel">
      <h2>Water supply &amp; bill for the month</h2>
      <div class="row">
        <label>Total received (litres)</label>
        <input type="number" id="water-received">
        <label>Water bill amount (₹)</label>
        <input type="number" id="water-bill-amount">
        <button id="save-supply-btn">Save</button>
      </div>
    </section>

    <section class="panel">
      <h2>Shared expenses</h2>
      <div class="row">
        <input type="text" id="exp-category" placeholder="e.g. Watchman salary">
        <input type="number" id="exp-amount" placeholder="Amount ₹">
        <button id="add-expense-btn">Add</button>
      </div>
      <div id="expenses-list"></div>
    </section>

    <section class="panel">
      <h2>Bill</h2>
      <div id="bill-table"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
