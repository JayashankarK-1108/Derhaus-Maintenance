services:
  - type: web
    name: derhaus-maintenance
    runtime: node
    plan: free
    buildCommand: npm install && npm run migrate
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false          # Set this manually in the Render dashboard
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 18.20.4
